name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # CI only uses its ephemeral service database. It never receives a
      # production DATABASE_URL or credentials.
      DATABASE_URL: ""
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: nba_user
      DB_PASSWORD: nba_password
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nba_user
          POSTGRES_PASSWORD: nba_password
          POSTGRES_DB: nba_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v9
        with:
          enable-cache: true

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install browser for end-to-end tests
        run: uv run --locked playwright install --with-deps chromium

      - name: Lint
        run: uv run --locked ruff check etl/ app/ db/ scripts/ tests/

      - name: Typecheck
        run: uv run --locked mypy etl/ app/ db/ scripts/

      - name: Test
        run: uv run --locked pytest tests/ -v
