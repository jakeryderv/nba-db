name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine pull-request impact
        if: github.event_name == 'pull_request'
        id: changes
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: python scripts/ci_impact.py github-output --base-ref "$BASE_REF"

      - name: Run affected Dagger checks
        if: github.event_name == 'pull_request'
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.21.7"
          verb: call
          args: >-
            check-affected
            --source=.
            --changed-paths-b64=${{ steps.changes.outputs.paths_b64 }}

      - name: Run full Dagger checks
        if: github.event_name != 'pull_request'
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.21.7"
          verb: call
          args: full --source=.

      - name: Audit dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.21.7"
          verb: call
          args: dependency-audit --source=. --audit-key=${{ github.run_id }}
