<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Stats</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">N</div>
                <div class="logo-text">NBA Stats</div>
            </div>
            <div class="season-display" aria-label="Loaded dataset">
                <span class="season-display-label">Dataset</span>
                <span id="season-label">Loading…</span>
            </div>
        </div>
    </header>

    <nav aria-label="Primary">
        <ul>
            <li>
                <a href="#standings" class="nav-link active" data-section="standings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                    Standings
                </a>
            </li>
            <li>
                <a href="#leaders" class="nav-link" data-section="leaders">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    Leaders
                </a>
            </li>
            <li>
                <a href="#games" class="nav-link" data-section="games">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    Games
                </a>
            </li>
            <li>
                <a href="#players" class="nav-link" data-section="players">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Players
                </a>
            </li>
            <li>
                <a href="#compare" class="nav-link" data-section="compare">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3L4 7l4 4M4 7h16M16 21l4-4-4-4m4 4H4"/></svg>
                    Compare
                </a>
            </li>
        </ul>
    </nav>

    <main>
        <!-- Standings -->
        <section id="standings" class="section active">
            <div class="section-header">
                <h2 class="section-title">Standings</h2>
            </div>
            <div class="table-container">
                <div class="table-scroll" id="standings-table"></div>
            </div>
        </section>

        <!-- Leaders -->
        <section id="leaders" class="section">
            <div class="section-header">
                <h2 class="section-title">League Leaders <span id="leaders-info"></span></h2>
                <div class="controls">
                    <select id="leaders-stat" class="filter-select" aria-label="Leader statistic">
                        <option value="points">Points</option>
                        <option value="rebounds">Rebounds</option>
                        <option value="assists">Assists</option>
                        <option value="steals">Steals</option>
                        <option value="blocks">Blocks</option>
                    </select>
                </div>
            </div>
            <div class="cards-grid" id="leaders-grid"></div>
        </section>

        <!-- Games -->
        <section id="games" class="section">
            <div class="section-header">
                <h2 class="section-title">Games <span id="games-info"></span></h2>
                <div class="controls">
                    <select id="games-team" class="filter-select" aria-label="Filter games by team">
                        <option value="">All Teams</option>
                    </select>
                    <select id="games-sort" class="filter-select" aria-label="Sort games">
                        <option value="desc">Newest First</option>
                        <option value="asc">Oldest First</option>
                    </select>
                </div>
            </div>
            <div class="cards-grid" id="games-grid"></div>
            <div class="pagination" id="games-pagination"></div>
        </section>

        <!-- Players -->
        <section id="players" class="section">
            <div class="section-header">
                <h2 class="section-title">Players <span id="players-info"></span></h2>
                <div class="controls">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        <input type="search" id="player-search" placeholder="Search players..." aria-label="Search players">
                    </div>
                    <select id="player-active" class="filter-select" aria-label="Filter players by status">
                        <option value="">All Players</option>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="table-container">
                <div class="table-scroll" id="players-table"></div>
            </div>
            <div class="pagination" id="players-pagination"></div>
        </section>

        <!-- Comparisons -->
        <section id="compare" class="section">
            <div class="section-header">
                <h2 class="section-title">Compare</h2>
            </div>
            <div class="compare-tabs" role="tablist" aria-label="Comparison type">
                <button class="compare-tab active" id="player-compare-tab" role="tab" aria-selected="true" aria-controls="player-compare-panel" data-action="compare-tab" data-compare-type="players">Players</button>
                <button class="compare-tab" id="team-compare-tab" role="tab" aria-selected="false" aria-controls="team-compare-panel" data-action="compare-tab" data-compare-type="teams">Teams</button>
            </div>
            <div class="compare-panel" id="player-compare-panel" role="tabpanel" aria-labelledby="player-compare-tab">
                <form class="compare-controls" id="player-compare-form">
                    <div class="compare-field"><label for="compare-player-one">First player</label><select class="filter-select" id="compare-player-one" required><option value="">Select a player</option></select></div>
                    <span class="compare-versus">VS</span>
                    <div class="compare-field"><label for="compare-player-two">Second player</label><select class="filter-select" id="compare-player-two" required><option value="">Select a player</option></select></div>
                    <button class="primary-button" type="submit">Compare players</button>
                </form>
                <div id="player-comparison-result" aria-live="polite"></div>
            </div>
            <div class="compare-panel" id="team-compare-panel" role="tabpanel" aria-labelledby="team-compare-tab" hidden>
                <form class="compare-controls" id="team-compare-form">
                    <div class="compare-field"><label for="compare-team-one">First team</label><select class="filter-select" id="compare-team-one" required><option value="">Select a team</option></select></div>
                    <span class="compare-versus">VS</span>
                    <div class="compare-field"><label for="compare-team-two">Second team</label><select class="filter-select" id="compare-team-two" required><option value="">Select a team</option></select></div>
                    <button class="primary-button" type="submit">Compare teams</button>
                </form>
                <div id="team-comparison-result" aria-live="polite"></div>
            </div>
        </section>

    </main>

    <!-- Player Modal -->
    <div class="modal-overlay" id="player-modal" role="dialog" aria-modal="true" aria-labelledby="player-modal-title" aria-hidden="true">
        <div class="modal" tabindex="-1">
            <div class="modal-header">
                <span class="modal-title" id="player-modal-title"></span>
                <button class="modal-close" data-action="close-modal" aria-label="Close player profile">&times;</button>
            </div>
            <div class="modal-body" id="player-modal-body"></div>
        </div>
    </div>

    <!-- Game Modal -->
    <div class="modal-overlay" id="game-modal" role="dialog" aria-modal="true" aria-labelledby="game-modal-title" aria-hidden="true">
        <div class="modal" tabindex="-1">
            <div class="modal-header">
                <span class="modal-title" id="game-modal-title"></span>
                <button class="modal-close" data-action="close-modal" aria-label="Close game box score">&times;</button>
            </div>
            <div class="modal-body" id="game-modal-body"></div>
        </div>
    </div>

    <!-- Team Modal -->
    <div class="modal-overlay" id="team-modal" role="dialog" aria-modal="true" aria-labelledby="team-modal-title" aria-hidden="true">
        <div class="modal" tabindex="-1">
            <div class="modal-header">
                <span class="modal-title" id="team-modal-title"></span>
                <button class="modal-close" data-action="close-modal" aria-label="Close team dashboard">&times;</button>
            </div>
            <div class="modal-body" id="team-modal-body"></div>
        </div>
    </div>
    <script src="/static/app.js" defer></script>
</body>
</html>
