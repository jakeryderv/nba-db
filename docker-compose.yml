services:
  db:
    image: mysql:8.0
    container_name: nba_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nba_db}
      MYSQL_USER: ${DB_USER:-nba_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nba_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
