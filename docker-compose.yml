services:
  db:
    image: postgres:16-alpine
    container_name: nba_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nba_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nba_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
